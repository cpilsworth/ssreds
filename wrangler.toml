name = "ssreds"
main = "src/index.ts"
compatibility_date = "2025-09-01"
workers_dev = true

# Multi-site host-derived routing.
# HOST_MAP entries: { "<hostname-suffix>": "<eds-host-suffix>" }
# Visitor hits <ref--repo--org>--live.diffatech.co.uk
#   -> worker proxies https://<ref--repo--org>.aem.live
# Visitor hits <ref--repo--org>--page.diffatech.co.uk
#   -> worker proxies https://<ref--repo--org>.aem.page
[vars]
HOST_MAP = '{"--live.diffatech.co.uk":"aem.live","--page.diffatech.co.uk":"aem.page",".aem.live":"aem.live",".aem.page":"aem.page"}'
# Hostnames allowed in fragment hrefs *without* being rewritten to the EDS
# origin. JSON responses from these hosts are rendered as nested HTML so
# crawlers can read API payloads server-side.
ALLOWED_FRAGMENT_HOSTS = '["j2api.cpilsworth.workers.dev"]'

[[routes]]
pattern = "*--live.diffatech.co.uk/*"
zone_name = "diffatech.co.uk"

[[routes]]
pattern = "*--page.diffatech.co.uk/*"
zone_name = "diffatech.co.uk"
