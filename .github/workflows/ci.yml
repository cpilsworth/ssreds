name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test (with coverage)
        run: npm run test:coverage

      # Compile the TypeScript source to WASM so a broken Fastly Compute build
      # is caught in CI, not at deploy time.
      - name: Build (WASM)
        run: npm run build

  deploy:
    name: Deploy AEM Edge Function
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # Limit to one concurrent deploy at a time so successive pushes don't race.
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    environment:
      name: build
    # Deploys via the Adobe I/O CLI to an Edge Delivery Site behind the Adobe
    # Managed CDN. Populate these secrets in the `build` GitHub environment:
    #   AEM_EDGE_FUNCTIONS_PROGRAM_ID   – Cloud Manager program ID
    #   AEM_EDGE_FUNCTIONS_SITE_DOMAIN  – the Edge Delivery site domain
    #   AEM_EDGE_FUNCTIONS_ADC_CLIENT_ID / _CLIENT_SECRET / _SCOPES
    #       – OAuth Server-to-Server credentials from the Adobe Developer Console
    env:
      AEM_EDGE_FUNCTIONS_PROGRAM_ID: ${{ secrets.AEM_EDGE_FUNCTIONS_PROGRAM_ID }}
      AEM_EDGE_FUNCTIONS_EDGE_DELIVERY: true
      AEM_EDGE_FUNCTIONS_SITE_DOMAIN: ${{ secrets.AEM_EDGE_FUNCTIONS_SITE_DOMAIN }}
      AEM_EDGE_FUNCTIONS_ADC_CLIENT_ID: ${{ secrets.AEM_EDGE_FUNCTIONS_ADC_CLIENT_ID }}
      AEM_EDGE_FUNCTIONS_ADC_CLIENT_SECRET: ${{ secrets.AEM_EDGE_FUNCTIONS_ADC_CLIENT_SECRET }}
      AEM_EDGE_FUNCTIONS_ADC_SCOPES: ${{ secrets.AEM_EDGE_FUNCTIONS_ADC_SCOPES }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install aio CLI and plugin
        run: |
          npm install -g @adobe/aio-cli
          aio plugins:install @adobe/aio-cli-plugin-aem-edge-functions

      - name: Build
        run: aio aem edge-functions build

      - name: Deploy
        run: aio aem edge-functions deploy ssreds
