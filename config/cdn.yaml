kind: 'CDN'
version: '1'
data:
  originSelectors:
    rules:
      # Route EDS document requests through the edge function so it can inline
      # fragment content. Matches only the site root and extensionless page
      # paths (last segment has no dot) — e.g. `/`, `/products`, `/blog/post`.
      # Anything with an extension (.html, .plain.html, .json, .js, .css,
      # images, …) is left to the normal EDS origin so the function only runs
      # where it adds value.
      - name: route-documents-to-ssreds
        when: { reqProperty: path, matches: "^(/|/([^/]+/)*[^/.]+)$" }
        action:
          type: selectAemOrigin
          originName: edgefunction-ssreds
