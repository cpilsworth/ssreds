kind: 'CDN'
version: '1'
data:
  originSelectors:
    rules:
      # Route HTML document requests through the edge function so it can inline
      # fragment content. Extensionless paths and the site root are documents;
      # .plain.html and asset paths are left to the normal EDS origin so the
      # function only runs where it adds value.
      - name: route-documents-to-ssreds
        when: { reqProperty: path, matches: "^(/|.*[^.]+|.*\\.html)$" }
        action:
          type: selectAemOrigin
          originName: edgefunction-ssreds
